# Cat Café Skills Manifest — 路由单一真相源
# 所有 skill 的触发规则、排除条件、产出契约、链式导航在此定义。
# CLAUDE.md / AGENTS.md / GEMINI.md 的路由表当前手工同步（Wave 2 计划自动生成）。
# lint 规则：pnpm check:skills（Wave 2 计划增强为 manifest 一致性校验）
#
# 更新日期：2026-02-28
# 来源决策：F042 三层信息架构

# ─── 开发流程链 ─────────────────────────────────────────
# feat-lifecycle → Design Gate(设计确认) → writing-plans → worktree → tdd
#     → quality-gate → request-review → receive-review
#     → merge-gate → feat-lifecycle(完成)

skills:

  # ── 功能生命周期 ──
  feat-lifecycle:
    description: >
      Feature 立项、讨论、完成的全生命周期管理。
      Use when: 开个新功能、new feature、F0xx、立项、feature 完成、验收通过、讨论新功能需求。
      Not for: 代码实现、review、merge（那些有专门的 skill）。
      Output: Feature 聚合文件 + BACKLOG 索引 + 真相源同步。
    triggers:
      - "开个新功能"
      - "new feature"
      - "F0xx"
      - "立项"
      - "feature 完成"
      - "F0xx done"
      - "验收通过"
      - "讨论新功能需求"
    not_for:
      - "写代码"
      - "review"
      - "merge"
    output: "Feature aggregate file / truth-source sync"
    next: ["writing-plans"]
    sop_step: null
    merged_from: ["feat-kickoff", "feat-discussion", "feat-completion"]

  # ── 引导流程设计 ──
  guide-authoring:
    description: >
      标准引导流程设计 SOP：场景识别 → YAML 编排 → 标签标注 → 注册发现 → 测试验证。
      Use when: 新建引导流程、添加场景引导、维护 Guide Catalog、编写引导 YAML。
      Not for: 使用引导（用户侧）、Guide Engine 代码实现（用 tdd）、视觉设计（用 pencil-design）。
      Output: Flow YAML + tag-manifest 更新 + registry 注册 + CI 校验通过。
    triggers:
      - "新建引导"
      - "添加场景引导"
      - "写引导流程"
      - "guide authoring"
      - "引导 YAML"
    not_for:
      - "使用引导"
      - "Guide Engine 实现"
      - "出设计稿"
    output: "Flow YAML / tag-manifest / registry entry / CI green"
    next: ["pencil-design", "tdd"]
    sop_step: null

  guide-interaction:
    description: >
      场景引导交互模式：匹配到引导流程后，向用户提供交互式选择卡片，
      处理用户选择（开始引导/步骤概览/跳过），启动前端引导 overlay。
      Use when: 系统注入了 Guide Available（自动触发，不需要手动加载）。
      Not for: 没有匹配到引导流程的普通对话。
      Output: 引导选择卡片 + 状态持久化 + 前端引导启动。
    triggers:
      - "引导流程"
      - "guide"
    not_for:
      - "没有匹配到引导流程的普通对话"
    output: "Guide choice card / state persistence / overlay start"
    next: ["guide-authoring"]
    sop_step: null

  # ── 协作思考 ──
  collaborative-thinking:
    description: >
      单人或多猫的创意探索、独立思考、讨论收敛。
      Use when: brainstorm、多猫独立思考、讨论结束需要收敛、方向性问题需要多视角。
      Not for: 已有明确 spec 直接写代码、单猫执行已定方案。
      Output: 收敛报告（共识/分歧/行动项）+ 三件套沉淀检查。
    triggers:
      - "brainstorm"
      - "讨论"
      - "多猫独立思考"
      - "收敛"
      - "讨论结束"
      - "总结一下"
    not_for:
      - "已有 spec 直接写代码"
      - "单人执行"
    output: "Convergence report + settlement checklist"
    next: ["writing-plans", "feat-lifecycle"]
    sop_step: null
    merged_from: ["brainstorming", "multi-cat-brainstorm", "discussion-convergence"]

  # ── 专家辩论团 ──
  expert-panel:
    description: >
      多猫专家辩论团：独立分析→挑战→收敛→风险预演→语音汇报→文档交付。
      Use when: 技术趋势判断、竞品分析、行业事件分析、需要多视角决策支持、铲屎官说"帮我分析一下"。
      Not for: 单猫能搞定的问题、代码实现、bug fix、日常聊天。
      Output: 洞察卡片(rich block) + 语音总结 + 会议纪要 + 正式报告(DOCX/PDF)。
    triggers:
      - "帮我分析一下"
      - "专家辩论"
      - "expert panel"
      - "技术参谋"
      - "竞品分析"
      - "行业分析"
      - "趋势判断"
      - "多猫分析"
      - "三猫讨论"
      - "showcase"
    not_for:
      - "单猫能搞定的问题"
      - "代码实现"
      - "bug fix"
      - "日常聊天"
    output: "Insight card + voice summary + meeting notes + formal report (DOCX/PDF)"
    next: ["feat-lifecycle", "deep-research", "collaborative-thinking"]
    sop_step: null
    merged_from: null

  # ── 计划编写 ──
  writing-plans:
    description: >
      将 spec/需求拆分为可执行的分步实施计划。
      Use when: 有 spec 或需求，准备动手前需要拆分步骤。
      Not for: trivial 改动（≤5 行）、已有详细计划。
      Output: 分步实施计划（含 TDD 步骤和检查点）。
    triggers:
      - "写计划"
      - "implementation plan"
      - "拆分步骤"
    not_for:
      - "trivial 改动"
      - "已有计划"
    output: "Phased implementation plan"
    next: ["worktree"]
    sop_step: null
    merged_from: null

  # ── Worktree 隔离 ──
  worktree:
    description: >
      创建 Git worktree 隔离开发环境，含 Redis 6398 安全配置。
      Use when: 开始任何代码修改、新功能开发、bug fix。
      Not for: 纯文档修改（≤5 行）、不涉及代码的讨论。
      Output: 隔离的 worktree + 正确的 Redis/环境配置。
    triggers:
      - "开始开发"
      - "新 worktree"
      - "开 worktree"
    not_for:
      - "纯文档 ≤5 行"
      - "不涉及代码"
    output: "Isolated worktree with Redis 6398"
    next: ["tdd"]
    sop_step: 1
    merged_from: ["using-git-worktrees"]

  # ── TDD ──
  tdd:
    description: >
      Red-Green-Refactor 测试驱动开发纪律。
      Use when: 写新功能代码、修 bug、任何实现工作。
      Not for: 纯文档、纯调研、已有充分测试的 trivial 改动。
      Output: 失败测试 → 最小实现 → 重构，全程有测试保护。
    triggers:
      - "写代码"
      - "test first"
      - "TDD"
      - "红绿重构"
    not_for:
      - "纯文档"
      - "调研"
    output: "Tests + implementation (red-green-refactor)"
    next: ["quality-gate"]
    sop_step: 1
    merged_from: ["test-driven-development"]

  # ── 调试 ──
  debugging:
    description: >
      系统化 bug 定位：根因调查 → 模式分析 → 假设验证 → 修复。
      Use when: 遇到 bug、测试失败、unexpected behavior。
      Not for: 新功能开发、重构、已知原因的简单修复。
      Output: Bug report（5件套）+ 根因 + 修复（含回归测试）。
    triggers:
      - "bug"
      - "报错"
      - "test failure"
      - "unexpected behavior"
    not_for:
      - "新功能"
      - "重构"
    output: "Bug report + root cause + fix"
    next: ["quality-gate"]
    sop_step: null
    merged_from: ["systematic-debugging"]

  # ── 质量门禁 ──
  quality-gate:
    description: >
      开发完成后的自检门禁：愿景对照 + spec 合规 + 验证。
      Use when: 开发完了准备提 review、声称完成了、准备交付。
      Not for: 收到 review 反馈（用 receive-review）、merge（用 merge-gate）。
      Output: Spec 合规报告（含愿景覆盖度）。
    triggers:
      - "开发完了"
      - "准备 review"
      - "自检"
      - "声称完成"
    not_for:
      - "收到 review 反馈"
      - "merge"
    output: "Spec compliance report + vision alignment"
    next: ["request-review"]
    sop_step: 2
    merged_from: ["spec-compliance-check", "verification-before-completion"]

  # ── 请求 Review ──
  request-review:
    description: >
      向跨家族 peer-reviewer 发送 review 请求（含五件套）。
      Use when: 自检通过后准备请其他猫 review。
      Not for: 收到 review 结果（用 receive-review）、自检（用 quality-gate）。
      Output: Review 请求信（存档到 review-notes/）。
    triggers:
      - "请 review"
      - "帮我看看"
      - "request review"
    not_for:
      - "收到 review"
      - "自检"
    output: "Review request letter in review-notes/"
    next: ["receive-review"]
    sop_step: 3
    merged_from: ["cat-cafe-requesting-review"]

  # ── 接收 Review ──
  receive-review:
    description: >
      处理 reviewer 反馈：Red→Green 修复 + 技术论证（禁止表演性同意）。
      Use when: 收到 review 结果、reviewer 提了 P1/P2、需要处理反馈。
      Not for: 发 review 请求（用 request-review）、自检（用 quality-gate）。
      Output: 逐项修复确认 + reviewer 放行。
    triggers:
      - "review 结果"
      - "review 意见"
      - "reviewer 说"
      - "fix these"
    not_for:
      - "发 review 请求"
      - "自检"
    output: "Per-item fix confirmation + reviewer sign-off"
    next: ["merge-gate"]
    sop_step: 3
    merged_from: ["cat-cafe-receiving-review"]

  # ── 合入门禁 ──
  merge-gate:
    description: >
      合入 main 的完整流程：门禁检查 → PR → 云端 review → squash merge → 清理。
      Use when: reviewer 放行后准备合入、开 PR、触发云端 review、准备 merge。
      Not for: 开发中、review 未通过、自检未完成。
      Output: PR merged + worktree cleaned。
    triggers:
      - "合入 main"
      - "merge"
      - "准备合入"
      - "开 PR"
      - "cloud review"
      - "gh pr create"
    not_for:
      - "开发中"
      - "review 未通过"
    output: "PR merged (squash) + worktree cleaned"
    next: ["feat-lifecycle"]
    sop_step: [4, 5, 6]
    merged_from: ["merge-approval-gate", "requesting-cloud-review", "finishing-a-development-branch"]

  # ── 自我进化 ──
  self-evolution:
    description: >
      Scope Guard + Process Evolution + Knowledge Evolution — 主动护栏与自我进化。
      Use when: 铲屎官 scope 发散偏离愿景、同类错误反复出现、SOP 流程缺口、有价值的知识/方法论值得沉淀。
      Not for: 日常 SOP 推进（正常执行）、一次性个案 bug fix。
      Output: Scope 收束提醒 / 流程改进提案 / 知识沉淀提案。
    triggers:
      - "scope 发散"
      - "又犯了"
      - "反复犯错"
      - "流程缺口"
      - "我们应该改"
      - "self-evolution"
      - "这个错误犯了好多次"
      - "要不要拆成多个 feat"
      - "这个值得记住"
      - "沉淀一下"
      - "这个方法论不错"
      - "episode card"
      - "method card"
      - "知识沉淀"
      - "蒸馏"
      - "eval ledger"
      - "成熟度"
    not_for:
      - "日常 SOP 推进"
      - "一次性 bug fix"
    output: "Scope Guard Log / Evolution Proposal / Episode Card → Method/Skill → Eval"
    next: []
    sop_step: null
    merged_from: null

  # ── 跨猫交接 ──
  cross-cat-handoff:
    description: >
      跨猫传话/交接的五件套结构（What/Why/Tradeoff/Open/Next）。
      Use when: 交接工作给其他猫、传话、写 review 信。
      Not for: 自己的任务、不涉及其他猫的工作。
      Output: 结构化交接信。
    triggers:
      - "交接"
      - "传话"
      - "handoff"
    not_for:
      - "自己的任务"
      - "不涉及其他猫"
    output: "5-part handoff message"
    next: []
    sop_step: null
    merged_from: null

  # ── 跨 Thread 协同 ──
  cross-thread-sync:
    description: >
      跨 thread 协同：发现平行 session → 通知（3+2 件套）→ 争用协调 → 确认。
      Use when: 平行 session 之间需要协同、通知改动影响、共享文件争用。
      Not for: 跨猫工作交接（用 cross-cat-handoff）。
      Output: cross-post 通知 + 争用协调完成。
    triggers:
      - "通知另一个 session"
      - "跨 thread"
      - "平行世界"
      - "parallel session sync"
      - "另一只Ragdoll"
      - "cross-thread"
    not_for:
      - "跨猫交接（用 cross-cat-handoff）"
    output: "cross-post notification + contention resolution"
    next: []
    sop_step: null
    merged_from: null

  # ── 深度调研 ──
  deep-research:
    description: >
      多源深度调研管道（Web Deep Research + Coder 合成）。
      Use when: 技术问题需要多源调查、设计决策需要证据、铲屎官说"调研"/"research"。
      Not for: 简单搜索（直接用 WebSearch）、已有结论的确认。
      Output: 调研报告 + 证据合成。
    triggers:
      - "调研"
      - "research"
      - "深度研究"
    not_for:
      - "简单搜索"
      - "已有结论"
    output: "Research report with evidence synthesis"
    next: ["collaborative-thinking"]
    sop_step: null
    merged_from: ["deep-research-pipeline"]

  # ── 知识工程（F152 Phase 0）──
  knowledge-engineering:
    description: >
      猫猫指导外部项目文档重构 — AI FDE 知识工程方法论。
      Use when: 猫猫部署到外部项目、用户项目缺少结构化文档、需要知识工程指导、冷启动理解业务。
      Not for: cat-cafe 项目自身开发、已有完善 docs/ 结构的项目（直接用 CatCafeScanner）。
      Output: 文档现状诊断 + 路径选择 + 三层知识注入建议 + 文档骨架模板。
    triggers:
      - "知识工程"
      - "文档重构"
      - "外部项目"
      - "knowledge engineering"
      - "冷启动"
      - "AI FDE"
      - "帮我整理文档"
    not_for:
      - "cat-cafe 自身开发"
      - "已有完善 docs/ 结构"
    output: "Documentation assessment + path selection + three-layer knowledge injection + skeleton templates"
    next: []
    sop_step: null
    merged_from: null

  # ── 定时任务 ──
  schedule-tasks:
    description: >
      定时任务注册、管理、能力指南。支持周期任务和一次性延迟任务。
      Use when: 用户想设定时任务、定期提醒、周期巡检、定时发送内容、延迟执行一次性操作。
      Not for: 已有 builtin 任务的手动触发。
      Output: 注册/管理定时任务，任务到点唤醒猫执行。
    triggers:
      - "定时"
      - "每天"
      - "每小时"
      - "每隔"
      - "提醒我"
      - "remind me"
      - "schedule"
      - "cron"
      - "定期"
      - "周期"
      - "定时任务"
      - "分钟后"
      - "小时后"
      - "之后"
      - "later"
      - "in 5 minutes"
      - "once"
    not_for:
      - "builtin 任务手动触发"
    output: "Registered/managed scheduled task"
    next: ["rich-messaging"]
    sop_step: null
    merged_from: null

  # ── 视频制作 ──
  video-forge:
    description: >
      视频制作全链路：素材入库 → 剧本冻结 → 全局配音 → 对齐 → 渲染 → 审查 → 交付。
      Use when: 做视频、做 showcase、做教程视频、录屏剪辑、video review、节奏审查。
      Not for: 纯代码开发（用 worktree/tdd）、纯文档写作（直接写）、PPT（用 ppt-forge）。
      Output: schema 驱动的视频成片 + 多猫审查通过 + 可发布。
    triggers:
      - "做视频"
      - "showcase 视频"
      - "教程视频"
      - "录屏剪辑"
      - "video review"
      - "节奏审查"
    not_for:
      - "纯代码开发"
      - "纯文档写作"
      - "PPT"
    output: "Schema-driven video production pipeline"
    next: ["rich-messaging"]
    sop_step: null
    merged_from: null

  # ── Skill 编写 ──
  writing-skills:
    description: >
      创建或修改 Cat Café skill / MCP tool description 的元技能（含质量标准、范本、发布）。
      Use when: 写新 skill、修改现有 skill、写/改 MCP tool description、验证 skill 质量；
      或者功能实现中产出了 SKILL.md / cat-cafe-skills/ 新目录 / manifest.yaml skill 条目。
      Not for: 使用 skill（直接触发对应 skill）。
      Output: 新/更新的 SKILL.md + manifest 条目 + symlinks。
      GOTCHA: 软硬同重——skill/MCP 质量 = 代码质量，写之前先看范本。
    triggers:
      - "写 skill"
      - "新 skill"
      - "修改 skill"
      - "SKILL.md"
      - "cat-cafe-skills/"
      - "manifest.yaml skill"
      - "创建 hook"
      - "新增 hook"
      - "写 MCP"
      - "MCP description"
      - "tool description"
    not_for:
      - "使用 skill"
    output: "SKILL.md + manifest entry + symlinks"
    next: []
    sop_step: null
    merged_from: null

  # ── Pencil 设计 ──
  pencil-design:
    description: >
      使用 Pencil MCP 创建/编辑 .pen 设计文件，或导出为 React 代码。
      Use when: 设计 UI、编辑 .pen 文件、从设计稿生成代码。
      Not for: 纯代码实现（无设计稿）、非 Pencil 工具的设计工作。
      Output: .pen 设计文件 或 React/Tailwind 组件代码。
    triggers:
      - "pencil"
      - ".pen 文件"
      - "设计稿"
    not_for:
      - "纯代码无设计"
    output: ".pen file or React/Tailwind component"
    requires_mcp:
      - "pencil"
    next: []
    sop_step: null
    merged_from: ["pencil-to-code", "pencil-renderer"]

  # ── 富媒体消息 ──
  rich-messaging:
    description: >
      富媒体消息发送：语音、图片、卡片、清单、代码 diff。
      Use when: 发语音、发图、发卡片、展示结构化信息、庆祝、给我听听、给我看看。
      Not for: 纯文字聊天、技术讨论、日常回复。
      Output: rich block 附着在消息上。
    triggers:
      - "发语音"
      - "说一句"
      - "录一段"
      - "用语音说"
      - "voice"
      - "audio"
      - "发图"
      - "发张图"
      - "看图"
      - "截图给我看"
      - "screenshot"
      - "发个卡片"
      - "rich block"
      - "checklist"
      - "发个清单"
      - "庆祝一下"
      - "展示一下"
      - "给我听听"
      - "给我看看"
      - "show me"
    not_for:
      - "纯文字聊天"
      - "技术讨论"
      - "日常回复"
    output: "Rich block attached to message"
    next: []
    sop_step: null
    merged_from: null
    feature: "F066"

  # ── 企业 IM 工作流 (F162) ──
  enterprise-workflow:
    description: >
      企业 IM 工作流自动化：文档、表格、待办/任务、会议/日程一键创建。
      Use when: 铲屎官要求创建企微/飞书的文档/表格/待办/会议/日程/幻灯片，或"一句话生成完整工作流"。
      Not for: 普通聊天、消息收发（那是 F088 Transport Plane 的活）。
      Output: 资源链接（文档 URL、企微会议链接、日程 summary 等）通过 callback 返回。
